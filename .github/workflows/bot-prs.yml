---
name: Bot PRs

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: write

jobs:
  label-no-releasenotes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Label no releasenotes
        run: |
          number=${{ github.event.pull_request.number }}
          is_bot=$(gh pr view $number --json author --jq '.author.is_bot')
          if [[ $is_bot == "true" ]]; then
            gh pr edit $number --add-label "no releasenotes"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  auto-merge-bot-prs:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.type == 'Bot'
    steps:
      - name: Auto-merge PR
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --auto --delete-branch
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
